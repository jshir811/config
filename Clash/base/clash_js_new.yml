#---------------------------------------------------#
# 配置文件需要放置在 $HOME/.config/clash/config.yml
# 或者运行目录下的config.yml
#---------------------------------------------------#
# 允许局域网的连接（可用来共享代理），其他设备经过 Clash 的代理端口访问互联网，可选值 true/false
allow-lan: true
# 仅在将allow-lan设置为true时适用，绑定地址，仅允许其他设备通过这个地址访问
# "*": 绑定所有IP地址
# 192.168.122.11: 绑定单个IPv4地址
# "[aaaa::a8aa:ff:fe09:57d8]": 绑定单个IPv6地址
bind-address: "*"
# 允许连接的 IP 地址段，仅作用于 allow-lan 为 true 默认值为 0.0.0.0/0和 ::/0
lan-allowed-ips:
- 0.0.0.0/0
- ::/0
# 禁止连接的 IP 地址段，黑名单优先级高于白名单，默认值为空
#lan-disallowed-ips:
#- 192.168.0.3/32
# http(s)/socks/mixed代理的用户验证
# authentication:
#  - "user1:pass1"
#  - "user2:pass2"
# 设置允许跳过验证的 IP 段
#skip-auth-prefixes:
#- 127.0.0.1/8
#- ::1/128

# 运行模式：rule（规则） / global（全局代理，需要在 GLOBAL 策略组选择代理/策略）/ direct（全局直连）/ script (脚本)，此项拥有默认值，默认为规则模式
mode: rule

# 日志级别：Clash 内核输出日志的等级，仅在控制台和控制页面输出 (默认级别：silent，即不输出任何内容，以避免因日志内容过大而导致程序内存溢出）。
# silent 静默，不输出
# error 仅输出发生错误至无法使用的日志
# warning 输出发生错误但不影响运行的日志，以及 error 级别内容
# info 输出一般运行的内容，以及 error 和 warning 级别的日志
# debug 尽可能的输出运行中所有的信息
log-level: info

# 是否允许内核接受 IPv6 流量
# 可选值 true/false,默认为 true
ipv6: true

# TCP Keep Alive 设置，修改此项以减少移动设备耗电问题
# TCP Keep Alive 包的间隔，单位为秒
keep-alive-interval: 15
# TCP Keep Alive 的最大空闲时间
keep-alive-idle: 15
# 禁用 TCP Keep Alive，在 Android 强制为 true
disable-keep-alive: false

# 进程匹配模式
# 控制是否让 Clash 去匹配进程
# always 开启，强制匹配所有进程
# strict 默认，由 Clash 判断是否开启
# off 不匹配进程，推荐在路由器上使用此模式
find-process-mode: strict

# 外部控制 (API)
# 外部控制器，可以使用 RESTful API 来控制你的 Clash 内核
# API 监听地址，你可以将 127.0.0.1 修改为 0.0.0.0 来监听所有 IP
external-controller: 127.0.0.1:9090
# API CORS 标头配置
external-controller-cors:
  allow-origins:
    - '*'
  allow-private-network: true
# Unix socket API 监听地址
# 从Unix socket访问api接口不会验证secret， 如果开启请自行保证安全问题
#external-controller-unix: mihomo.sock
# Windows namedpipe API 监听地址
# 从Windows namedpipe访问api接口不会验证secret， 如果开启请自行保证安全问题
#external-controller-pipe: \\.\pipe\mihomo
# HTTPS-API 监听地址，需要配置 tls 部分证书和其私钥配置，使用 TLS 也必须填写 external-controller
#external-controller-tls: 127.0.0.1:9443
# 在 RESTful API 端口上开启 DOH 服务器
# 该URL不会验证secret， 如果开启请自行保证安全问题
#external-doh-server: /dns-query
# API 的访问密钥
#secret: ""

# 外部用户界面
# 可以将静态网页资源 (比如 Clash-dashboard) 运行在 Clash API, 路径为 API 地址/ui
# 参数应填写配置目录的相对路径或绝对路径。
# http://127.0.0.1:9090/ui/#/
# external-ui: folder
# yacd面板：  https://github.com/haishanh/yacd
# Razord面板：http://clash.razord.top/#/proxies
# 可以为绝对路径，或者 Clash 工作目录的相对路径
# 注意，如果路径不在 Clash 工作目录，请手动设置SAFE_PATHS环境变量将其加入安全路径，该环境变量的语法同本操作系统的 PATH 环境变量解析规则（即 Windows 下以分号分割，其他系统下以冒号分割）。
#external-ui: /path/to/ui/folder
# 自定义外部用户界面名字，非必须，更新时会更新到指定文件夹，不配置则直接更新到 external-ui 目录
#external-ui-name: xd      #  合并为 external-ui/xd
# 自定义外部用户界面下载地址
#external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip" #从 GitHub Pages 分支获取

# 缓存设置(文件位置./cache.db)
profile:
  #节点状态记忆（若不同配置有同代理名称,设置值共享），储存 API 对策略组的选择，以供下次启动时使用
  store-selected: true
  #fake-ip缓存，储存 fakeip 映射表，域名再次发生连接时，使用原有映射地址
  store-fake-ip: true

# 统一延迟
# 开启统一延迟时，会计算 RTT，以消除连接握手等带来的不同类型节点的延迟差异
# 可选值 true/false
unified-delay: true

# 启用 TCP 并发连接，将会使用 dns 解析出的所有 IP 地址进行连接，使用第一个成功、握手最快的IP进行连接，可选值 true/false
tcp-concurrent: true

# 出站接口：mihomo 的流量出站接口
#interface-name: en0

# 路由标记
# 为 Linux 下的出站连接提供默认流量标记
routing-mark: 6666

# TLS
# 目前仅用于 API 的 https
#tls:
  #certificate: string # 证书 PEM 格式，或者 证书的路径
  #private-key: string # 证书对应的私钥 PEM 格式，或者私钥路径
  #ech-key: |-
    #-----BEGIN ECH KEYS-----
    #ACATwY30o/RKgD6hgeQxwrSiApLaCgU+HKh7B6SUrAHaDwBD/g0APwAAIAAgHjzK
    #madSJjYQIf9o1N5GXjkW4DEEeb17qMxHdwMdNnwADAABAAEAAQACAAEAAwAIdGVz
    #dC5jb20AAA==
    #-----END ECH KEYS-----
  # ECH 密钥，如果填写则会启用 ECH
# 自v1.19.18版本开始，当certificate, private-key 或 ech-key为本地文件时支持自动重载。

# GEOIP 数据模式
# 更改 geoip 使用文件，mmdb 或者 dat，可选 true/false,true为 dat，此项有默认值 false
geodata-mode: true
# GEO 文件加载模式
# 可选的加载模式如下
# standard：标准加载器
# memconservative：专为内存受限 (小内存) 设备优化的加载器 (默认值)
geodata-loader: standard
# 自动更新 GEO
geo-auto-update: true
# 更新间隔，单位为小时
geo-update-interval: 24
# 自定 GEO 下载地址
#geox-url:
  #geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  #geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  #mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  #asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

# 自定全局 UA
# 自定义外部资源下载时使用的的 UA，默认为 clash.meta
#global-ua: clash.meta

# ETag 支持
# 外部资源下载的 ETag 支持，默认为 true
#etag-support: true

dns:
  enable: true # 是否启用，如为 false，则使用系统 DNS 解析
  cache-algorithm: arc # 支持的算法：lru: Least Recently Used, 默认值；arc: Adaptive Replacement Cache
  prefer-h3: true # DOH 优先使用 http/3
  use-hosts: true # 是否回应配置中的 hosts，默认 true
  use-system-hosts: false # 是否查询系统 hosts，默认 true
  # 配置后面的nameserver、fallback和nameserver-policy向dns服务器的连接过程是否遵守遵守rules规则
  # 如果为false（默认值）则这三部分的dns服务器在未特别指定的情况下会直连
  # 如果为true，将会按照rules的规则匹配链接方式（走代理或直连），如果有特别指定则任然以指定值为准
  # 仅当proxy-server-nameserver非空时可以开启此选项, 强烈不建议和prefer-h3一起使用
  # 此外，这三者配置中的dns服务器如果出现域名会采用default-nameserver配置项解析，也请确保正确配置default-nameserver
  respect-rules: false # dns 连接遵守路由规则，需配置 proxy-server-nameserver，强烈不建议和 prefer-h3 一起使用
  listen: 0.0.0.0:1053 # DNS 服务监听，支持 udp, tcp
  ipv6: true # 是否解析 IPV6, 如为 false, 则回应 AAAA 的空解析
  default-nameserver: # 默认 DNS, 用于解析 DNS 服务器 的域名，必须为 IP, 可为加密 DNS
     - 223.5.5.5 # 阿里DNS
     - 180.76.76.76 # 百度DNS
     - 119.29.29.29 # 腾讯DNS
     #- 117.50.11.11 # ONE DNS拦截版 恶意网站拦截、广告过滤
     - 117.50.10.10 # ONE DNS纯净版 直接返回其真实的响应结果
     - tls://223.5.5.5:853 # DNS over TLS
     - tls://180.76.76.76:853
     - tls://119.29.29.29:853
     #- 114.114.114.114 # 114DNS
     #- 223.5.5.5 # 阿里DNS
     #- [2400:3200::1] # 阿里DNS
     #- 180.76.76.76 # 百度DNS
     #- 119.29.29.29 # 腾讯DNS
     #- 117.50.11.11 # ONE DNS拦截版 恶意网站拦截、广告过滤
     #- 117.50.10.10 # ONE DNS纯净版 直接返回其真实的响应结果
     #- 114.114.114.114 # 114DNS
     #- https://[2400:3200::1]/dns-query # 阿里DNS
     #- [2400:da00::6666] #百度DNS
     #- [2402:4e00::] # 腾讯DNS
     #- [2001:da8::666] #清华大学TUNA协会IPV6 DNS
     #- https://[2001:4860:4860::64]/dns-query #Google IPV6 DNS
     #- https://[2606:4700:4700::1111]/dns-query #Cloudflare IPV6 DNS
     #- https://v6.rubyfish.cn/dns-query #红鱼rubyfish IPV6 DNS
  enhanced-mode: fake-ip # 模式：redir-host或fake-ip，默认redir-host，mihomo 的 DNS 处理模式
  fake-ip-range: 198.18.0.1/16 # fakeip 下的 IP 段设置，tun 的默认 IPV4 地址 也使用此值作为参考
  fake-ip-range6: fdfe:dcba:9876::1/64 # fakeip 下的 IPv6 段设置
  fake-ip-filter-mode: blacklist # 可选 blacklist/whitelist/rule，默认blacklist，whitelist 即只有匹配成功才返回 fake-ip；当fake-ip-filter-mode设置为rule时，开启规则模式，此时fake-ip-filter的写法发生改变
  #fake-ip-filter: # fakeip 过滤，以下地址不会下发 fakeip 映射用于连接值支持域名通配以及引入域名集合
     ##- +.stun.*.*
     ##- +.stun.*.*.*
     ##- +.stun.*.*.*.*
     ##- lens.l.google.com
     ##- stun.l.google.com
     ##- '*.n.n.srv.nintendo.net'
     #- '*.lan'
     #- localhost.ptlogin2.qq.com
  # fake-ip-ttl: 1 # 配置fakeip查询返回的TTL，非必要情况下请勿修改
  #nameserver-policy: # 指定域名查询的解析服务器，可使用 geosite, 优先于 nameserver/fallback 查询，键支持域名通配，值支持字符串/数组
     #'+.arpa': '10.0.0.1'
     #'rule-set:cn':
     #- https://doh.pub/dns-query
     #- https://dns.alidns.com/dns-query
  nameserver: # 默认的域名解析服务器
     ##- 223.5.5.5 # 阿里DNS
     #- [2400:3200::1] # 阿里DNS
     ##- 180.76.76.76 # 百度DNS
     ##- 119.29.29.29 # 腾讯DNS
     ##- 117.50.11.11 # ONE DNS拦截版 恶意网站拦截、广告过滤
     ##- 117.50.10.10 # ONE DNS纯净版 直接返回其真实的响应结果
     ##- 114.114.114.114 # 114DNS
     ##- tls://223.5.5.5:853 # DNS over TLS
     - https://dns.alidns.com/dns-query&h3=true # 阿里 DoH DNS
     - https://223.5.5.5/dns-query&h3=true # 阿里 DoH DNS
     - https://223.6.6.6/dns-query&h3=true # 阿里 DoH DNS
     - https://doh.pub/dns-query # DnsPod 公共DNS
     - https://1.12.12.12/dns-query # DnsPod 公共DNS
     - https://120.53.53.53/dns-query # DnsPod 公共DNS
     - https://doh-pure.onedns.net/dns-query # ONE DNS纯净版
     - https://doh.360.cn/dns-query # 360 DoH DNS
     #- https://dns.cfiec.net/dns-query # 中国下一代互联网公共DNS
     ##- https://rubyfish.cn/dns-query # 红鱼dns
     ##- https://dns.233py.com/dns-query # GEEKDNS
     ##- dhcp://en0 # dns from dhcp
     - https://1.1.1.1/dns-query#RULES&h3=true # Cloudflare 公共DNS
     - https://1.0.0.1/dns-query#RULES&h3=true # Cloudflare 公共DNS
     - https://cloudflare-dns.com/dns-query#RULES&h3=true # Cloudflare 公共DNS
     - https://dns.google/dns-query#RULES&h3=true # Google 公共DNS
     - https://doh.dns.sb/dns-query#RULES # DNS.SB
     - https://dns.quad9.net/dns-query#RULES # Quad9 公共DNS
     - https://doh.opendns.com/dns-query#RULES # OpenDNS
     #- [2400:da00::6666] #百度DNS
     #- [2402:4e00::] # 腾讯DNS
     #- [2001:da8::666] #清华大学TUNA协会IPV6 DNS
     - https://[2400:3200::1]/dns-query&h3=true # 阿里 IPV6 DNS
     #- https://[2001:4860:4860::64]/dns-query#RULES&h3=true #Google IPV6 DNS
     - https://[2606:4700:4700::1111]/dns-query#RULES&h3=true #Cloudflare IPV6 DNS
     - https://[2606:4700:4700::64]/dns-query#RULES&h3=true #Cloudflare IPV6 DNS
     #- https://v6.rubyfish.cn/dns-query #红鱼rubyfish IPV6 DNS
  fallback: # 后备域名解析服务器，一般情况下使用境外 DNS, 保证结果可信，配置 fallback后默认启用 fallback-filter,geoip-code为 cn
     #- 8.8.8.8 # 谷歌DNS
     #- [2001:4860:4860::8888] # 谷歌DNS
     #- 1.1.1.1 # Cloudflare DNS
     #- [2606:4700:4700::1111] # Cloudflare DNS
     - https://1.1.1.1/dns-query#RULES&h3=true # Cloudflare 公共DNS
     - https://1.0.0.1/dns-query#RULES&h3=true # Cloudflare 公共DNS
     - https://cloudflare-dns.com/dns-query#RULES&h3=true # Cloudflare 公共DNS
     - https://dns.google/dns-query#RULES&h3=true # Google 公共DNS
     - https://doh.dns.sb/dns-query#RULES # DNS.SB
     #- https://dns-unfiltered.adguard.com/dns-query # AdGuard DNS
     - https://dns.quad9.net/dns-query#RULES # Quad9 公共DNS
     - https://doh.opendns.com/dns-query#RULES # OpenDNS
     #- https://[2001:4860:4860::64]/dns-query#RULES&h3=true #Google IPV6 DNS
     - https://[2606:4700:4700::1111]/dns-query#RULES&h3=true #Cloudflare IPV6 DNS
     - https://[2606:4700:4700::64]/dns-query#RULES&h3=true #Cloudflare IPV6 DNS
     #- tls://dns.rubyfish.cn:853
     #- tls://1.0.0.1:853
     #- tls://dns.google:853
     #- https://dns.rubyfish.cn/dns-query
     #- https://cloudflare-dns.com/dns-query
  proxy-server-nameserver: # 代理节点域名解析服务器，仅用于解析代理节点的域名，如果不填则遵循 nameserver-policy、nameserver 和 fallback 的配置
     - https://dns.alidns.com/dns-query&h3=true # 阿里 DoH DNS
     - https://223.5.5.5/dns-query&h3=true # 阿里 DoH DNS
     - https://223.6.6.6/dns-query&h3=true # 阿里 DoH DNS
     - https://doh.pub/dns-query # DnsPod 公共DNS
     - https://1.12.12.12/dns-query # DnsPod 公共DNS
     - https://120.53.53.53/dns-query # DnsPod 公共DNS
     - https://doh-pure.onedns.net/dns-query # ONE DNS纯净版
     - https://doh.360.cn/dns-query # 360 DoH DNS
     - https://[2400:3200::1]/dns-query # 阿里 IPV6 DNS
  #proxy-server-nameserver-policy: # 格式同nameserver-policy，仅用于节点域名解析，当且仅当proxy-server-nameserver不为空时生效
     #'www.yournode.com': '114.114.114.114'
  #direct-nameserver: # 用于 direct 出口域名解析的 DNS 服务器，如果不填则遵循 nameserver-policy、nameserver 和 fallback 的配置
     #- system
  #direct-nameserver-follow-policy: false # 是否遵循 nameserver-policy，默认为不遵守，仅当 direct-nameserver 不为空时生效
  fallback-filter: # 后备域名解析服务器筛选，满足条件的将使用 fallback结果或只使用 fallback解析
     geoip: true # 是否启用 geoip 判断
     geoip-code: CN # 可选值为 国家缩写，默认值为 CN，除了 geoip-code 配置的国家 IP, 其他的 IP 结果会被视为污染，geoip-code 配置的国家的结果会直接采用，否则将采用 fallback结果
     #geosite: # 可选值为对于的 geosite 内包含的集合，geosite 列表的内容被视为已污染，匹配到 geosite 的域名，将只使用 fallback解析，不去使用 nameserver
       #- gfw
     #ipcidr: # 书写内容为 IP/掩码，这些网段的结果会被视为污染，nameserver解析出这些结果时将会采用 fallback的解析结果
       #- 240.0.0.0/4
     #domain: # 这些域名被视为已污染，匹配到这些域名，会直接使用 fallback解析，不去使用 nameserver
       #- '+.google.com'
       #- '+.facebook.com'
       #- '+.youtube.com'

# 实验性功能 hosts, 支持通配符 (例如 *.clash.dev 甚至 *.foo.*.example.com)
# 静态的域名 比 通配域名 具有更高的优先级 (foo.example.com 优先于 *.example.com)
# 注意: hosts 在 fake-ip 模式下不生效
#hosts: # 键支持域名通配，值支持字符串/数组，域名重定向不支持数组
  #'*miwifi.com*': 192.168.31.1
  #'*homeassistant.local*': 192.168.31.247
  #'*.clash.dev': 127.0.0.1
  #'alpha.clash.dev': '::1'
  #test.com: [1.1.1.1, 2.2.2.2]
  #baidu.com: google.com

# 域名嗅探
sniffer:
  enable: true # 是否启用 sniffer
  force-dns-mapping: true # 对 redir-host 类型识别的流量进行强制嗅探
  parse-pure-ip: true # 对所有未获取到域名的流量进行强制嗅探
  override-destination: true # 是否使用嗅探结果作为实际访问，默认为 true
  sniff: # 需要嗅探的协议设置，仅支持 HTTP/TLS/QUIC
    HTTP:
      ports: [80, 8080-8880] # 端口范围
      override-destination: true # 覆盖全局override-destination设置
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain: # 强制进行嗅探的域名列表，使用域名通配
    #- +.v2ex.com
  skip-domain: # 跳过嗅探的域名列表，使用域名通配
    #- Mijia Cloud
  skip-src-address: # 跳过嗅探的来源 IP 段列表
    #- 192.168.0.3/32
  skip-dst-address: # 跳过嗅探的目标 IP 段列表
    #- 192.168.0.3/32

# 入站
# 代理端口
# HTTP 代理端口
port: 7890
# SOCKS4/4a/5 代理端口
socks-port: 7891
# 混合端口是一个特殊的端口，它同时支持 HTTP(S) 和 SOCKS5 协议。您可以使用任何支持 HTTP 或 SOCKS 代理的程序连接到这个端口
mixed-port: 7892
# redirect 透明代理端口，仅限 Linux(Android) 以及 macOS 适用，仅能代理 TCP 流量
redir-port: 7893
# tproxy 透明代理端口，仅限 linux(Android) 适用，可代理 TCP 与 UDP 流量
tproxy-port: 7894

# tun
tun:
  enable: true # 启用 tun
  # tun 模式堆栈，如无使用问题，建议使用 mixed栈，默认 gvisor
  # 可用值： system/gvisor/mixed
  # 协议栈之间的区别
  # system 使用系统协议栈，可以提供更稳定/全面的 tun 体验，且占用相对其他堆栈更低
  # gvisor 通过在用户空间中实现网络协议栈，可以提供更高的安全性和隔离性，同时可以避免操作系统内核和用户空间之间的切换，从而在特定情况下具有更好的网络处理性能
  # mixed 混合堆栈，tcp 使用 system栈，udp 使用 gvisor栈，使用体验可能相对更好、
  # 简单性能测试
  # 如果打开了防火墙，则无法使用 system 和 mixed 协议栈，通过以下方式放行内核：
  # Windows: 设置 -> Windows 安全中心 -> 允许应用通过防火墙 -> 选中内核
  # MacOS: 一般无需配置，防火墙默认放行签名软件，如果遇到开启防火墙无法使用的情况，可以尝试放行：系统设置 -> 网络 -> 防火墙 -> 选项 -> 添加 mihomo app
  # Linux: 一般无需配置，防火墙默认不拦截应用，如果遇到开启防火墙无法使用的情况，可以尝试放行 TUN 网卡出站流量（假设 TUN 网卡为 Mihomo）: sudo iptables -A OUTPUT -o Mihomo -j ACCEPT
  stack: mixed
  auto-route: true # 自动设置全局路由，可以自动将全局流量路由进入 tun 网卡。
  # 仅支持 Linux，自动配置 iptables/nftables 以重定向 TCP 连接，需要auto-route已启用
  # 在 Android 中：仅转发本地 IPv4 连接。要通过热点或中继共享您的 VPN 连接，请使用 VPNHotspot。
  # 在 Linux 中：带有 auto-route 的 auto-redirect 现在可以在路由器上按预期工作，无需干预。
  auto-redirect: true
  auto-detect-interface: true # 自动选择流量出口接口，多出口网卡同时连接的设备建议手动指定出口网卡
  # dns 劫持，将匹配到的连接导入内部 dns 模块，不书写协议则为 udp://
  # 在 MacOS/Windows 无法自动劫持发往局域网的 dns 请求
  # 在 Android 如开启 私人dns 则无法自动劫持 dns 请求
  dns-hijack:
    - any:53
    - tcp://any:53
  #device: utun0 # 指定 tun 网卡名称，MacOS 设备只能使用 utun 开头的网卡名
  mtu: 9000 # 最大传输单元，会影响极限状态下的速率，一般用户默认即可。
  # 启用 auto-route 时执行严格的路由规则
  # 在 Linux 中:让不支持的网络无法到达，将所有连接路由到 tun，它可以防止地址泄漏，并使 DNS 劫持在 Android 上工作。
  # 在 Windows 中:添加防火墙规则以阻止 Windows 的 普通多宿主 DNS 解析行为 造成的 DNS 泄露，它可能会使某些应用程序（如 VirtualBox）在某些情况下无法正常工作。
  strict-route: true
  gso: true # 启用通用分段卸载，仅支持 Linux
  gso-max-size: 65536 # 数据块的最大长度
  udp-timeout: 300 # UDP NAT 过期时间，以秒为单位，默认为 300(5 分钟)
  iproute2-table-index: 2022 # auto-route 生成的 iproute2 路由表索引，默认使用 2022
  iproute2-rule-index: 9000 # auto-route 生成的 iproute2 规则起始索引，默认使用 9000
  endpoint-independent-nat: false # 启用独立于端点的 NAT，性能可能会略有下降，所以不建议在不需要的时候开启。
  # 将指定规则集中的目标 IP CIDR 规则添加到防火墙，不匹配的流量将绕过路由 仅支持 Linux，且需要 nftables 以及auto-route 和 auto-redirect 已启用。
  # 与任意配置中的 routing-mark 冲突
  #route-address-set:
    #- ruleset-1
  # 将指定规则集中的目标 IP CIDR 规则添加到防火墙，匹配的流量将绕过路由 仅支持 Linux，且需要 nftables 以及auto-route 和 auto-redirect 已启用。
  # 与任意配置中的 routing-mark 冲突
  #route-exclude-address-set:
    #- ruleset-2
  # 启用 auto-route时路由自定义路由网段而不是默认路由，一般无需配置。
  #route-address:
    #- 0.0.0.0/1
    #- 128.0.0.0/1
    #- "::/1"
    #- "8000::/1"
  # 启用 auto-route 时排除自定义网段
  #route-exclude-address:
  #- 192.168.0.0/16
  #- fc00::/7
  # 限制被路由的接口，默认不限制，与 exclude-interface 冲突，不可一起配置
  #include-interface:
  #- eth0
  # 排除路由的接口，与 include-interface 冲突，不可一起配置
  #exclude-interface:
  #- eth1
  # 包含的用户，使其被 Tun 路由流量，未被配置的用户不会被 Tun 路由流量，默认不限制
  # UID 规则仅在 Linux 下被支持,并且需要 auto-route
  #include-uid:
  #- 0
  # 包含的用户范围，使其被 Tun 路由流量，未被配置的用户不会被 Tun 路由流量
  #include-uid-range:
  #- 1000:9999
  # 排除用户，使其避免被 Tun 路由流量
  #exclude-uid:
  #- 1000
  # 排除用户范围，使其避免被 Tun 路由流量
  #exclude-uid-range:
  #- 1000:9999
  # 包含的 Android 用户，使其被 Tun 路由流量，未被配置的用户不会被 Tun 路由流量
  # Android 用户和应用规则仅在 Android 下被支持,并且需要 auto-route
  # 常用用户	ID
  # 机主	0
  # 手机分身	10
  # 应用多开	999
  #include-android-user:
  #- 0
  #- 10
  # 包含的 Android 应用包名，使其被 Tun 路由流量，未配置的应用包不会被 Tun 路由流量
  #include-package:
  #- com.android.chrome
  # 排除 Android 应用包名，使其避免被 Tun 路由流量
  #exclude-package:
  #- com.android.captiveportallogin

